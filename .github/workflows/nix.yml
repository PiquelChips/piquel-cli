name: Nix

on:
  push:
    branches:
      - main
    paths:
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
  pull_request:
    paths:
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flake:
    name: Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake
        run: nix flake check --accept-flake-config
